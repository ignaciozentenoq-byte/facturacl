# .github/workflows/ci.yml
# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline para FacturaCL
# Ejecuta tests en cada PR y build en push a main.
# Railway hace el deploy automático desde main.
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          # Variables mínimas para que config/index.js no falle en CI
          KOYWE_CLIENT_ID:     ci-test
          KOYWE_CLIENT_SECRET: ci-test
          KOYWE_USERNAME:      ci-test
          KOYWE_PASSWORD:      ci-test
          KOYWE_ACCOUNT_ID:    1
          ISSUER_RUT:          76399932-7
          ISSUER_LEGAL_NAME:   Test SpA
          ISSUER_ACTIVITY:     Test
          ISSUER_ADDRESS:      Test 123
          ISSUER_DISTRICT:     Santiago
          ISSUER_CITY:         Santiago
          QUICKPOS_API_KEY:    ci-test-key

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t facturacl:${{ github.sha }} .

      - name: Verificar health check en imagen
        run: |
          docker run -d --name test-container \
            -e PORT=3000 \
            -e KOYWE_CLIENT_ID=test \
            -e KOYWE_CLIENT_SECRET=test \
            -e KOYWE_USERNAME=test \
            -e KOYWE_PASSWORD=test \
            -e KOYWE_ACCOUNT_ID=1 \
            -e ISSUER_RUT=76399932-7 \
            -e ISSUER_LEGAL_NAME="Test SpA" \
            -e ISSUER_ACTIVITY=Test \
            -e ISSUER_ADDRESS="Test 123" \
            -e ISSUER_DISTRICT=Santiago \
            -e ISSUER_CITY=Santiago \
            -e QUICKPOS_API_KEY=test-key \
            -p 3001:3000 \
            facturacl:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3001/health
          docker stop test-container
